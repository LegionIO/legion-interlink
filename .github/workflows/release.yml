name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ── Shared setup anchor ────────────────────────────────────────────────────────
# Each job that needs Node runs these three steps. Keeping them DRY via YAML
# anchors isn't supported in GitHub Actions, so each job repeats the three lines.
# pnpm's content-addressable store is cached by setup-node so installs are fast.

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ── Type check ────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ── Version bump check (PRs only) ─────────────────────────────────────────────
  version-check:
    name: Version Bump Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version was bumped
        run: |
          base_version=$(git show ${{ github.event.pull_request.base.sha }}:package.json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          pr_version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "Base: $base_version  PR: $pr_version"
          if [ "$base_version" = "$pr_version" ]; then
            echo "ERROR: package.json version was not bumped (still $pr_version). Bump the version before merging." >&2
            exit 1
          fi

  # ── Changelog check (PRs only) ────────────────────────────────────────────────
  changelog-check:
    name: Changelog Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG was updated
        run: |
          if git diff ${{ github.event.pull_request.base.sha }}...HEAD -- CHANGELOG.md | grep -q '^+'; then
            echo "CHANGELOG.md updated — OK"
          else
            echo "ERROR: CHANGELOG.md was not updated. Add an entry for your changes." >&2
            exit 1
          fi

  # ── Release (main push only) ──────────────────────────────────────────────────
  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, type-check, build]
    runs-on: macos-26
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      asset_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin
          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."

      - run: pnpm install --frozen-lockfile
        if: steps.tag_check.outputs.exists == 'false'

      - run: pnpm build:mac
        if: steps.tag_check.outputs.exists == 'false'

      - name: Verify Swift helper binary
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          APP_PATH="$(find dist/mac-arm64 -maxdepth 1 -name '*.app' -type d | head -n 1)"
          HELPER="$APP_PATH/Contents/Resources/bin/LocalMacosHelper"

          if [ ! -x "$HELPER" ]; then
            echo "ERROR: LocalMacosHelper binary not found or not executable at $HELPER" >&2
            exit 1
          fi

          echo "Helper binary: $(ls -la "$HELPER")"
          echo "Architectures: $(lipo -archs "$HELPER")"
          echo "Code signature:"
          codesign -dvv "$HELPER" 2>&1

          RESULT=$("$HELPER" permissions 2>&1)
          echo "Permissions check output: $RESULT"

          if ! echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ok') is True"; then
            echo "ERROR: LocalMacosHelper permissions check failed" >&2
            exit 1
          fi

      - name: Verify code signature
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          APP_PATH="$(find dist/mac-arm64 -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in dist/mac-arm64/" >&2
            exit 1
          fi

          echo "Verifying signature: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "Checking notarization staple:"
          xcrun stapler validate "$APP_PATH" || echo "Warning: staple not found (notarization may still be processing)"

      - name: Locate DMG artifact
        if: steps.tag_check.outputs.exists == 'false'
        id: artifact
        run: |
          artifact_path="$(find dist -maxdepth 1 -type f -name '*.dmg' | head -n 1)"

          if [ -z "$artifact_path" ]; then
            echo "No DMG artifact found in dist/." >&2
            exit 1
          fi

          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$artifact_path")" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" "${{ steps.artifact.outputs.path }}" \
            --generate-notes \
            --title "$TAG" \
            --verify-tag

  # ── Update Homebrew cask (main push, after release) ───────────────────────────
  update-cask:
    name: Update Cask
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Skip if no new release
        if: needs.release.outputs.asset_name == ''
        run: echo "No new release — skipping cask update."

      - name: Download DMG and compute SHA256
        if: needs.release.outputs.asset_name != ''
        id: sha
        env:
          ASSET_NAME: ${{ needs.release.outputs.asset_name }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --pattern "$ASSET_NAME" \
            --repo "${{ github.repository }}" \
            --output interlink.dmg
          sha=$(shasum -a 256 interlink.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "asset_name_url=${ASSET_NAME// /%20}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: needs.release.outputs.asset_name != ''
        with:
          repository: LegionIO/homebrew-tap
          token: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        if: needs.release.outputs.asset_name != ''
        working-directory: homebrew-tap
        env:
          ASSET_NAME_URL: ${{ steps.sha.outputs.asset_name_url }}
          REPOSITORY: ${{ github.repository }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p Casks
          cat > Casks/legion-interlink.rb << RUBY
          cask "legion-interlink" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPOSITORY}/releases/download/v#{version}/${ASSET_NAME_URL}"
            name "Legion Interlink"
            desc "LegionIO desktop client"
            homepage "https://github.com/${REPOSITORY}"

            app "Legion Interlink.app"

            zap trash: "~/.legionio"
          end
          RUBY

      - name: Commit and push cask update
        if: needs.release.outputs.asset_name != ''
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/legion-interlink.rb

          if git diff --cached --quiet; then
            echo "Cask formula is already up to date."
            exit 0
          fi

          git commit -m "update legion-interlink cask to ${VERSION}"
          git push
