name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build & Verify
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build (debug)
        run: swift build

  version-check:
    name: Version Bump Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version was bumped
        run: |
          base_version=$(git show ${{ github.event.pull_request.base.sha }}:VERSION | tr -d '[:space:]')
          pr_version=$(cat VERSION | tr -d '[:space:]')
          echo "Base: $base_version  PR: $pr_version"
          if [ "$base_version" = "$pr_version" ]; then
            echo "ERROR: VERSION was not bumped (still $pr_version). Bump the version before merging." >&2
            exit 1
          fi

  changelog-check:
    name: Changelog Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG was updated
        run: |
          if git diff ${{ github.event.pull_request.base.sha }}...HEAD -- CHANGELOG.md | grep -q '^+'; then
            echo "CHANGELOG.md updated — OK"
          else
            echo "ERROR: CHANGELOG.md was not updated. Add an entry for your changes." >&2
            exit 1
          fi

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [checks]
    runs-on: macos-26
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      dmg_name: ${{ steps.package.outputs.dmg_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          version="$(cat VERSION | tr -d '[:space:]')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin
          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."

      # Build universal binary (arm64 + x86_64)
      - name: Build arm64
        if: steps.tag_check.outputs.exists == 'false'
        run: swift build -c release --arch arm64

      - name: Build x86_64
        if: steps.tag_check.outputs.exists == 'false'
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p dist/bin
          lipo -create \
            .build/arm64-apple-macosx/release/LegionInterlink \
            .build/x86_64-apple-macosx/release/LegionInterlink \
            -output dist/bin/LegionInterlink
          echo "Architectures: $(lipo -archs dist/bin/LegionInterlink)"

      # Create .app bundle
      - name: Package .app bundle
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP="dist/Legion Interlink.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp dist/bin/LegionInterlink "$APP/Contents/MacOS/LegionInterlink"
          cp build/icon.icns "$APP/Contents/Resources/AppIcon.icns"

          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Legion Interlink</string>
              <key>CFBundleDisplayName</key>
              <string>Legion Interlink</string>
              <key>CFBundleIdentifier</key>
              <string>com.legion.interlink</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>LegionInterlink</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      # Code sign
      - name: Code sign
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          APP="dist/Legion Interlink.app"

          # Import signing certificate from secrets
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            echo "${{ secrets.CSC_LINK }}" | base64 --decode > /tmp/cert.p12
            security create-keychain -p "" build.keychain
            security import /tmp/cert.p12 -k build.keychain -P "${{ secrets.CSC_KEY_PASSWORD }}" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
            security list-keychains -d user -s build.keychain login.keychain

            codesign --deep --force --options runtime \
              --entitlements build/entitlements.mac.plist \
              --sign "Developer ID Application" \
              "$APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
          else
            echo "Warning: No signing certificate — skipping code sign"
          fi

      # Create DMG
      - name: Create DMG
        if: steps.tag_check.outputs.exists == 'false'
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_NAME="Legion-Interlink-${VERSION}-universal.dmg"
          hdiutil create \
            -volname "Legion Interlink" \
            -srcfolder "dist/Legion Interlink.app" \
            -ov -format UDZO \
            "dist/${DMG_NAME}"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_path=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"

      # Notarize
      - name: Notarize DMG
        if: steps.tag_check.outputs.exists == 'false' && env.APPLE_ID != ''
        env:
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
          DMG_NAME: ${{ steps.package.outputs.dmg_name }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "dist/Legion Interlink.app"

          # Re-create DMG with stapled app
          rm "$DMG_PATH"
          hdiutil create \
            -volname "Legion Interlink" \
            -srcfolder "dist/Legion Interlink.app" \
            -ov -format UDZO \
            "dist/${DMG_NAME}"

      # Create GitHub release
      - name: Create tag and GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          DMG_NAME: ${{ steps.package.outputs.dmg_name }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" "dist/${DMG_NAME}" \
            --generate-notes \
            --title "$TAG" \
            --verify-tag

  update-cask:
    name: Update Cask
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Skip if no new release
        if: needs.release.outputs.dmg_name == ''
        run: echo "No new release — skipping cask update."

      - name: Download DMG and compute SHA256
        if: needs.release.outputs.dmg_name != ''
        id: sha
        env:
          DMG_NAME: ${{ needs.release.outputs.dmg_name }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --pattern "$DMG_NAME" \
            --repo "${{ github.repository }}" \
            --output interlink.dmg
          sha=$(shasum -a 256 interlink.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: needs.release.outputs.dmg_name != ''
        with:
          repository: LegionIO/homebrew-tap
          token: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        if: needs.release.outputs.dmg_name != ''
        working-directory: homebrew-tap
        env:
          DMG_NAME: ${{ needs.release.outputs.dmg_name }}
          REPOSITORY: ${{ github.repository }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p Casks
          cat > Casks/legion-interlink.rb << RUBY
          cask "legion-interlink" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPOSITORY}/releases/download/v#{version}/${DMG_NAME}"
            name "Legion Interlink"
            desc "LegionIO menu bar manager — bootstrap, monitor, and control the Legion stack"
            homepage "https://github.com/${REPOSITORY}"

            depends_on formula: "legionio/tap/legionio"
            depends_on formula: "redis"
            depends_on formula: "memcached"
            depends_on formula: "ollama"
            depends_on macos: ">= :ventura"

            app "Legion Interlink.app"

            zap trash: "~/.legionio"
          end
          RUBY

      - name: Commit and push cask update
        if: needs.release.outputs.dmg_name != ''
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/legion-interlink.rb

          if git diff --cached --quiet; then
            echo "Cask formula is already up to date."
            exit 0
          fi

          git commit -m "update legion-interlink cask to ${VERSION}"
          git push
